# Portal Scanner Configuration — Ryan Brown
# Hospitality operations roles, Denver/remote focus
#
# LIVE-VERIFIED 2026-07-14 (career-ops audit; re-probed this session):
# The original `api:` greenhouse slugs were GUESSED and 25/26 returned HTTP 404 —
# most major hotel brands do NOT host on Greenhouse. Real feeds confirmed live NOW:
#   - Four Seasons    → Greenhouse JSON   HTTP 200 (boards-api.greenhouse.io, 716 B)
#   - Pyramid Global  → Phenom /widgets   HTTP 200, totalHits=1165 (careers.pyramidglobal.com)
# INERT / CANNOT ENABLE (no working provider or unverified feed):
#   - Hotel Equities  → `provider: icims` but NO icims.mjs provider exists in repo → inert
#   - Drury Hotels    → Workday tenant; CXS path unverified → `enabled: false`
# THE 23 REMAINING "DISABLED" BRANDS ARE NOT "VERIFIED UNREACHABLE" — that was FALSE.
#   verify-portals.mjs and scan.mjs both SKIP `enabled:false` entries, so their
#   reachability was NEVER machine-tested. Inline "no public JSON feed reachable"
#   notes below are UNVERIFIED assumptions, not audit results.
# COVERAGE STRATEGY: primary discovery = `scan-ats-full.mjs` (reverse ATS sweep over
# public Greenhouse/Lever/Ashby/Workday dirs, filtered by title/location below) +
# `search_queries` (Indeed/LinkedIn/Glassdoor via WebSearch). tracked_companies is a
# small verified supplement only.

title_filter:
  positive:
    - "General Manager"
    - "Director of Rooms"
    - "Director of Operations"
    - "Operations Manager"
    - "Regional Manager"
    - "Hotel Manager"
    - "Assistant General Manager"
    - "Rooms Division"
    - "Guest Services"
    - "Front Office Manager"
    - "Housekeeping Director"
    - "Revenue Manager"
    - "Area General Manager"
    - "Multi-Property"
  negative:
    - "Intern"
    - "Trainee"
    - "Entry Level"
    - "Housekeeping Attendant"
    - "Front Desk Agent"
    - "Line Cook"
    - "Server"
    - "Bartender"
    - "Dishwasher"
    - "Valet"
    - "Bellman"
    - "Concierge"
    - "Night Audit"
    - "Maintenance Technician"
    - "Engineer"
    - "Software"
    - "Developer"
    - "DevOps"
    - "Data Scientist"

location_filter:
  always_allow:
    - "United States"
    - "Denver"
    - "Colorado"
    - "Remote"
  allow:
    - "Remote"
    - "United States"
    - "Denver"
    - "Colorado"
  block:
    - "India"
    - "Philippines"
    - "United Kingdom"
    - "UAE"
    - "Dubai"
    - "Singapore"
    - "Australia"
    - "Canada"
    - "Mexico"

salary_filter:
  min: 70000
  max: 135000
  currency: "USD"

max_posting_age_days: 60

search_queries:
  - provider: indeed
    query: "Hotel General Manager Denver"
    enabled: true
  - provider: indeed
    query: "Director of Operations hospitality Denver"
    enabled: true
  - provider: linkedin
    query: "Hotel General Manager Denver CO"
    enabled: true
  - provider: linkedin
    query: "Director of Rooms United States"
    enabled: true
  - provider: linkedin
    query: "Director of Operations hospitality United States"
    enabled: true
  - provider: linkedin
    query: "Regional Manager hotels United States"
    enabled: true
  - provider: glassdoor
    query: "Hotel General Manager Denver"
    enabled: true
  - provider: glassdoor
    query: "Director of Operations hospitality"
    enabled: true

tracked_companies:
  # == VERIFIED machine-readable feeds (enabled) ==

  - name: Four Seasons
    careers_url: https://careers.fourseasons.com
    api: https://boards-api.greenhouse.io/v1/boards/fourseasons/jobs
    enabled: true   # VERIFIED 2026-07-14: Greenhouse JSON 200

  - name: Pyramid Global Hospitality
    careers_url: https://careers.pyramidglobal.com
    provider: phenom
    enabled: true   # VERIFIED 2026-07-14: Phenom /widgets 1163 hits

  - name: Drury Hotels
    careers_url: https://careers.druryhotels.com
    api: https://druryhotels.wd5.myworkdayjobs.com
    enabled: false  # Workday tenant confirmed on careers page, but CXS site path
                    # returns 406/404 — needs the real /wday/cxs/<tenant>/<site>/jobs path

  - name: Hotel Equities
    careers_url: https://careers.hotelequities.com
    provider: icims
    enabled: false  # iCIMS detected on careers page; no public feed verified — needs api:

