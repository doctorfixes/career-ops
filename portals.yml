# Portal Scanner Configuration — Ryan Brown
# Hospitality operations roles, Denver/remote focus

title_filter:
  positive:
    - "General Manager"
    - "Director of Rooms"
    - "Director of Operations"
    - "Operations Manager"
    - "Regional Manager"
    - "Hotel Manager"
    - "Assistant General Manager"
    - "Rooms Division"
    - "Guest Services"
    - "Front Office Manager"
    - "Housekeeping Director"
    - "Revenue Manager"
    - "Area General Manager"
    - "Multi-Property"
  negative:
    - "Intern"
    - "Trainee"
    - "Entry Level"
    - "Housekeeping Attendant"
    - "Front Desk Agent"
    - "Line Cook"
    - "Server"
    - "Bartender"
    - "Dishwasher"
    - "Valet"
    - "Bellman"
    - "Concierge"
    - "Night Audit"
    - "Maintenance Technician"
    - "Engineer"
    - "Software"
    - "Developer"
    - "DevOps"
    - "Data Scientist"

location_filter:
  always_allow:
    - "United States"
    - "Denver"
    - "Colorado"
    - "Remote"
  allow:
    - "Remote"
    - "United States"
    - "Denver"
    - "Colorado"
  block:
    - "India"
    - "Philippines"
    - "United Kingdom"
    - "UAE"
    - "Dubai"
    - "Singapore"
    - "Australia"
    - "Canada"
    - "Mexico"

salary_filter:
  min: 70000
  max: 135000
  currency: "USD"

max_posting_age_days: 60

search_queries:
  - provider: indeed
    query: "Hotel General Manager Denver"
    enabled: true
  - provider: indeed
    query: "Director of Operations hospitality Denver"
    enabled: true
  - provider: linkedin
    query: "Hotel General Manager Denver CO"
    enabled: true
  - provider: linkedin
    query: "Director of Rooms United States"
    enabled: true
  - provider: linkedin
    query: "Director of Operations hospitality United States"
    enabled: true
  - provider: linkedin
    query: "Regional Manager hotels United States"
    enabled: true
  - provider: glassdoor
    query: "Hotel General Manager Denver"
    enabled: true
  - provider: glassdoor
    query: "Director of Operations hospitality"
    enabled: true

